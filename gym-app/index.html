<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#05070B" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TuGymPR">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.supabase.co https://images.openfoodfacts.org https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://api.mapbox.com; media-src 'self' blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://us.i.posthog.com https://us-assets.i.posthog.com wss://*.supabase.co https://*.openfoodfacts.org https://api.mapbox.com https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://api.pwnedpasswords.com; frame-src 'self' https://tugympr.com https://*.tugympr.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>TuGymPR</title>
    <!-- Self-hosted fonts (no runtime call to Google) — see public/fonts/fonts.css -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <script>
      // Boot-failure recovery — the LAST net under the React ErrorBoundaries
      // and the StuckLoadingRecovery watcher. Fires only when #root is (still)
      // empty, i.e. the app genuinely failed to boot. Behavior:
      //   1. Errors/rejections are buffered, never painted raw.
      //   2. On the first wedged boot we silently reload once (most boot
      //      failures — half-applied OTA update, transient chunk fetch — heal
      //      on a clean reload).
      //   3. If the retry also fails, paint a BRANDED bilingual screen with a
      //      "Reintentar" button (+ a clear-cache fallback). The raw error
      //      stays collapsed behind "Detalles técnicos" for field debugging —
      //      a member must never see a naked stack trace or DB error.
      // Post-mount, the in-app ErrorBoundary + errorTracker own everything;
      // a MutationObserver tears this down the moment React commits.
      (function() {
        var buffer = '';
        var timer = null;
        var painted = false;

        function rootEmpty() {
          var root = document.getElementById('root');
          return !root || root.childElementCount === 0;
        }

        function paint() {
          if (painted || !rootEmpty() || !document.body) return;
          // First wedged boot → one silent retry before showing anything.
          try {
            if (!sessionStorage.getItem('__boot_retry__')) {
              sessionStorage.setItem('__boot_retry__', '1');
              location.reload();
              return;
            }
          } catch(_){}
          painted = true;
          var ov = document.createElement('div');
          ov.id = '__boot_error__';
          ov.style.cssText = 'position:fixed;inset:0;background:#0B0F12;color:#F3F0E9;font:15px/1.5 -apple-system,system-ui,sans-serif;z-index:99999;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;';
          ov.innerHTML =
            '<div style="max-width:340px;width:100%">' +
              '<div style="font-size:42px;line-height:1">&#128170;</div>' +
              '<div style="font-size:21px;font-weight:800;margin-top:14px;letter-spacing:-0.4px">No pudimos abrir el app</div>' +
              '<div style="font-size:13.5px;color:rgba(243,240,233,0.65);margin-top:8px">Algo fall&oacute; al iniciar. Int&eacute;ntalo de nuevo &mdash; tus datos est&aacute;n seguros.<br><span style="opacity:.7">Something went wrong while starting. Your data is safe.</span></div>' +
              '<button id="__boot_retry_btn__" style="margin-top:22px;width:100%;height:52px;border:none;border-radius:14px;background:linear-gradient(180deg,#2EC9B7,#178C7E);color:#06363B;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer">Reintentar &middot; Retry</button>' +
              '<button id="__boot_wipe_btn__" style="margin-top:10px;width:100%;height:44px;border:none;border-radius:12px;background:rgba(255,255,255,0.07);color:rgba(243,240,233,0.75);font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer">Borrar cach&eacute; y reintentar</button>' +
              '<details style="margin-top:18px;text-align:left"><summary style="font-size:11px;color:rgba(243,240,233,0.4);cursor:pointer">Detalles t&eacute;cnicos</summary>' +
                '<pre id="__boot_error_log__" style="font:10.5px/1.45 ui-monospace,monospace;color:rgba(243,240,233,0.5);white-space:pre-wrap;word-break:break-word;max-height:160px;overflow:auto;margin-top:8px"></pre>' +
              '</details>' +
            '</div>';
          document.body.appendChild(ov);
          var log = document.getElementById('__boot_error_log__');
          if (log) log.textContent = buffer || '(no error captured)';
          var retry = document.getElementById('__boot_retry_btn__');
          if (retry) retry.onclick = function(){
            try { sessionStorage.removeItem('__boot_retry__'); } catch(_){}
            location.reload();
          };
          var wipe = document.getElementById('__boot_wipe_btn__');
          if (wipe) wipe.onclick = function(){
            // Last resort for corrupted persisted state. Auth session lives in
            // localStorage too — the user re-logs in, which beats a dead app.
            try { localStorage.clear(); } catch(_){}
            try { sessionStorage.clear(); } catch(_){}
            location.reload();
          };
        }

        function onBootError(label, err) {
          try {
            if (painted || !rootEmpty()) return; // app is up — in-app handlers own it
            if (buffer.length < 4000) {
              buffer += '[' + label + '] ' + (err && (err.stack || err.message || err)) + '\n\n';
            }
            // Grace window: a healthy boot commits within a couple seconds —
            // only treat the boot as wedged if #root is STILL empty afterward.
            // (An early benign rejection a frame before first commit must not
            // reload or paint anything.)
            if (!timer) timer = setTimeout(paint, 2500);
          } catch(_){}
        }

        window.addEventListener('error', function(e){ onBootError('error', e.error || e.message); });
        window.addEventListener('unhandledrejection', function(e){ onBootError('reject', e.reason); });

        // The app mounted — clear the retry flag, kill any pending paint, and
        // remove the overlay if an early error had already drawn it.
        try {
          var mo = new MutationObserver(function(){
            if (rootEmpty()) return;
            try { sessionStorage.removeItem('__boot_retry__'); } catch(_){}
            if (timer) { clearTimeout(timer); timer = null; }
            var ov = document.getElementById('__boot_error__');
            if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
            painted = false;
            mo.disconnect();
          });
          mo.observe(document.documentElement, { childList: true, subtree: true });
        } catch(_){}
      })();
      // Apply theme before first paint — always follow system preference
      (function() {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
        // Clear stale manual overrides
        localStorage.removeItem('theme');
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content — use CSS variables set by theme */
      html, body { background-color: #F8FAFC; }
      html.dark, html.dark body { background-color: #05070B; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
