    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Global error overlay — shows JS errors visibly so we can diagnose
      // the "infinite loading" boot issue. Safe to ship; only renders when
      // a real error fires.
      (function() {
        function showError(label, err) {
          try {
            var overlay = document.getElementById('__boot_error__');
            if (!overlay) {
              overlay = document.createElement('div');
              overlay.id = '__boot_error__';
              overlay.style.cssText = 'position:fixed;inset:0;background:#0B0F12;color:#E8C547;font:13px -apple-system,monospace;padding:24px;overflow:auto;z-index:99999;white-space:pre-wrap;';
              document.body && document.body.appendChild(overlay);
            }
            overlay.textContent += '['+label+'] '+(err && (err.stack||err.message||err))+'\n\n';
          } catch(_){}
        }
        window.addEventListener('error', function(e){ showError('error', e.error || e.message); });
        window.addEventListener('unhandledrejection', function(e){ showError('reject', e.reason); });
      })();
      // Apply theme before first paint — always follow system preference
      (function() {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
        // Clear stale manual overrides
        localStorage.removeItem('theme');
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content — use CSS variables set by theme */
      html, body { background-color: #F8FAFC; }
      html.dark, html.dark body { background-color: #05070B; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
